<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>As Aventuras de Maicon</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/start-screen.css">
    <link rel="stylesheet" href="styles/game-layout.css">
    <link rel="stylesheet" href="styles/hud.css">
    <link rel="stylesheet" href="styles/boss-hud.css">
    <link rel="stylesheet" href="styles/overlays.css">
    <link rel="stylesheet" href="styles/story-cards.css">
    <link rel="stylesheet" href="styles/levels/level1.css">
    <link rel="stylesheet" href="styles/levels/level2.css">
    <link rel="stylesheet" href="styles/levels/level3.css">
    <link rel="stylesheet" href="styles/levels/level4.css">
    <link rel="stylesheet" href="styles/levels/level5.css">
    <link rel="stylesheet" href="styles/mobile.css">
</head>
<body>
    <!-- Tela de Início -->
    <div id="startScreen" class="start-screen">
        <div class="background-elements">
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
            <div class="cloud cloud3"></div>
            <div class="platform platform1"></div>
            <div class="platform platform2"></div>
            <div class="platform platform3"></div>
            <div class="tree tree1"></div>
            <div class="tree tree2"></div>
        </div>
        <div class="title-container">
            <h1 class="game-title">AS AVENTURAS DE</h1>
            <h1 class="game-title main-title">MAICON</h1>
            <div class="character-container">
                <div class="character"></div>
            </div>
            <button id="playBtn" class="play-button">
                <span class="play-text">INICIAR</span>
            </button>
        </div>
    </div>

    <!-- Cards de história (sequestro da princesa) -->
    <div id="storyScreen" class="story-screen" style="display:none;">
        <div class="story-card">
            <div id="storyCardArt" class="story-art"></div>
            <h2 id="storyCardTitle"></h2>
            <p id="storyCardText"></p>
            <div id="storyDots" class="story-dots"></div>
            <div class="story-controls">
                <button id="storySkipBtn" class="story-skip-btn">Pular</button>
                <button id="storyNextBtn" class="story-next-btn">Avançar ▶</button>
            </div>
        </div>
    </div>

    <!-- Tela do Jogo -->
    <div id="gameScreen" style="display: none;">
        <div class="game-cloud game-cloud1"></div>
        <div class="game-cloud game-cloud2"></div>
        <div class="game-cloud game-cloud3"></div>
        <h1 class="game-screen-title">🎮 As Aventuras de Maicon 🎮</h1>
        <div id="platformCounter">Plataformas: 0</div>
        <div id="levelIndicator">Nível 1 — Céu Azul</div>
        <div id="starCounter">Estrelas: 0 / 3</div>
        <div id="powerUpIndicator" style="display:none;"></div>
        <div id="starBonusMessage"></div>
        <div id="bossHealthBar" class="boss-health-bar">
            <div class="boss-health-label">👑 Chefe Meteoro</div>
            <div class="boss-health-track"><div id="bossHealthFill" class="boss-health-fill"></div></div>
        </div>
        <div id="bossItemIndicator" class="boss-item-indicator">🪨</div>
        <div id="canvasContainer">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <p class="game-instructions" style="margin-top: 10px; margin-bottom: 0;">Use as setas ⬅️➡️ para mover e ESPAÇO para pular!</p>
        </div>

        <!-- Botões de toque (exibidos só em telas touch, durante a partida) -->
        <div id="touchControls" style="display:none;">
            <div class="touch-cluster touch-cluster-left">
                <button type="button" class="touch-btn" id="btnLeft" aria-label="Mover para a esquerda">◀</button>
                <button type="button" class="touch-btn" id="btnRight" aria-label="Mover para a direita">▶</button>
            </div>
            <div class="touch-cluster touch-cluster-right">
                <button type="button" class="touch-btn touch-btn-throw" id="btnThrow" aria-label="Arremessar">🪨</button>
                <button type="button" class="touch-btn touch-btn-jump" id="btnJump" aria-label="Pular">⬆</button>
            </div>
        </div>
    </div>

    <!-- Overlay de conclusão de nível -->
    <div id="levelCompleteOverlay" class="overlay-screen" style="display:none;">
        <div id="levelCompleteText" class="overlay-title"></div>
    </div>

    <!-- Overlay do seletor de níveis -->
    <div id="levelSelectorOverlay" class="overlay-screen" style="display:none;">
        <div class="level-selector-container">
            <h2 class="selector-title">🗺️ Escolha um Nível</h2>
            <div id="levelGrid" class="level-grid"></div>
        </div>
    </div>

    <!-- Overlay de transição de nível (mantido para compatibilidade) -->
    <div id="levelTransition" style="display:none;">
        <div id="levelTransitionText"></div>
    </div>

    <!-- Game Over -->
    <div id="gameOverBox" style="display:none;">
      <div class="game-over-card">
        <h2>Fim de jogo!</h2>
        <p id="finalLevel">Nível 1</p>
        <p class="game-over-score">Você alcançou <span id="finalScore">0</span> plataformas!</p>
        <div class="game-over-actions">
            <button id="retryBtn">Tentar novamente</button>
            <button id="restartBtn">Escolher Nível</button>
        </div>
      </div>
    </div>

    <script src="scripts/vendor/howler.min.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/input.js"></script>
    <script src="scripts/viewport.js"></script>
    <script src="scripts/touchControls.js"></script>
    <script src="scripts/player.js"></script>
    <script src="scripts/platform.js"></script>
    <script src="scripts/camera.js"></script>
    <script src="scripts/levelManager.js"></script>
    <script src="scripts/platformGenerator.js"></script>
    <script src="scripts/lavaManager.js"></script>
    <script src="scripts/powerUpManager.js"></script>
    <script src="scripts/starManager.js"></script>
    <script src="scripts/bossArena.js"></script>
    <script src="scripts/bossManager.js"></script>
    <script src="scripts/bossItemManager.js"></script>
    <script src="scripts/soundManager.js"></script>
    <script src="scripts/uiManager.js"></script>
    <script src="scripts/storyManager.js"></script>
    <script src="scripts/game_fixed.js"></script>
    <script>
        // PWA: registra o service worker (só funciona em HTTPS ou localhost)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
