<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>As Aventuras de Maicon</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <!-- Tela de Início -->
    <div id="startScreen" class="start-screen">
        <div class="background-elements">
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
            <div class="cloud cloud3"></div>
            <div class="platform platform1"></div>
            <div class="platform platform2"></div>
            <div class="platform platform3"></div>
            <div class="tree tree1"></div>
            <div class="tree tree2"></div>
        </div>
        <div class="title-container">
            <h1 class="game-title">AS AVENTURAS DE</h1>
            <h1 class="game-title main-title">MAICON</h1>
            <div class="character-container">
                <div class="character"></div>
            </div>
            <button id="playBtn" class="play-button">
                <span class="play-text">INICIAR</span>
            </button>
        </div>
    </div>

    <!-- Tela do Jogo -->
    <div id="gameScreen" style="display: none;">
        <div class="game-cloud game-cloud1"></div>
        <div class="game-cloud game-cloud2"></div>
        <div class="game-cloud game-cloud3"></div>
        <h1 class="game-screen-title">🎮 As Aventuras de Maicon 🎮</h1>
        <div id="platformCounter">Plataformas: 0</div>
        <div id="levelIndicator">Nível 1 — Céu Azul</div>
        <div style="margin-top: 70px; display: flex; flex-direction: column; align-items: center;">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <p class="game-instructions" style="margin-top: 10px; margin-bottom: 0;">Use as setas ⬅️➡️ para mover e ESPAÇO para pular!</p>
        </div>
    </div>

    <!-- Overlay de conclusão de nível -->
    <div id="levelCompleteOverlay" class="overlay-screen" style="display:none;">
        <div id="levelCompleteText" class="overlay-title"></div>
    </div>

    <!-- Overlay do seletor de níveis -->
    <div id="levelSelectorOverlay" class="overlay-screen" style="display:none;">
        <div class="level-selector-container">
            <h2 class="selector-title">🗺️ Escolha um Nível</h2>
            <div id="levelGrid" class="level-grid"></div>
        </div>
    </div>

    <!-- Overlay de transição de nível (mantido para compatibilidade) -->
    <div id="levelTransition" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); z-index:50; justify-content:center; align-items:center; transition: opacity 0.6s ease;">
        <div id="levelTransitionText" style="color:white; font-family:'Arial Black',sans-serif; font-size:3.5em; text-align:center; text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4); animation: zoomIn 0.5s ease-out;"></div>
    </div>

    <!-- Game Over -->
    <div id="gameOverBox" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(30,58,138,0.9); z-index:10; justify-content:center; align-items:center;">
      <div style="background:white; padding:40px 60px; border-radius:20px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.3); border:3px solid #1e3a8a;">
        <h2 style="color:#1e3a8a; margin-bottom:10px; font-size:2em;">Fim de jogo!</h2>
        <p id="finalLevel" style="color:#F59E0B; font-weight:bold; font-size:1.2em; margin-bottom:15px;">Nível 1</p>
        <p style="color:#666; margin-bottom:25px; font-size:1.1em;">Você alcançou <span id="finalScore" style="color:#1e3a8a; font-weight:bold;">0</span> plataformas!</p>
        <button id="restartBtn" style="font-size:1.2em; padding:12px 35px; border-radius:10px; border:none; background:#1e3a8a; color:white; cursor:pointer; transition:background-color 0.3s;">Escolher Nível</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/player.js"></script>
    <script src="scripts/platform.js"></script>
    <script src="scripts/camera.js"></script>
    <script src="scripts/levelManager.js"></script>
    <script src="scripts/platformGenerator.js"></script>
    <script src="scripts/soundManager.js"></script>
    <script src="scripts/uiManager.js"></script>
    <script src="scripts/game_fixed.js"></script>
</body>
</html>
